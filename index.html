<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARENA Robotics | Vacuum Tweezers</title>
  
  <!-- Iosevka Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka@5.0.1/index.css" />

  <style>
    :root {
      --bg: #ffffff;
      --navy-dark: #0a1128;
      --navy-med: #1c2541;
      --border: #e2e8f0;
      --text-main: #0a1128;
      --text-muted: #4a5568;
      --bg-alt: #f8fafc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Iosevka', monospace;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem 4rem 1rem;

      /* Engineering Grid Background Design */
      background-image: 
        linear-gradient(to right, #f1f5f9 1px, transparent 1px),
        linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    /* Architectural Header */
    header {
      margin-bottom: 2.5rem;
      border: 2px solid var(--navy-dark);
      background: var(--bg);
      padding: 1.5rem;
      position: relative;
      box-shadow: 4px 4px 0px var(--navy-dark);
    }

    .brand-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--navy-dark);
    }

    .brand-title .arena {
      text-transform: uppercase;
    }

    .brand-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
      display: block;
    }

    .status-tag {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 0.75rem;
      border: 1px solid var(--navy-dark);
      padding: 0.2rem 0.5rem;
      background: var(--bg-alt);
    }

    /* Tab Switcher Layout */
    nav {
      display: flex;
      gap: 0;
      margin-bottom: 2.5rem;
      border-bottom: 2px solid var(--navy-dark);
    }

    .tab-btn {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      margin-right: 0.25rem;
      transition: all 0.15s ease;
    }

    .tab-btn:hover {
      background: #edf2f7;
      color: var(--navy-dark);
    }

    .tab-btn.active {
      background: var(--navy-dark);
      color: #ffffff;
      border-color: var(--navy-dark);
      font-weight: bold;
    }

    /* Tab Sections */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Shared Box Styling */
    .content-box {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      border: 2px solid var(--navy-dark);
      background: var(--bg);
      box-shadow: 6px 6px 0px rgba(10, 17, 40, 0.08);
      overflow: hidden;
    }

    /* Media Stack (Tab 1) */
    .media-stack {
      display: flex;
      flex-direction: column;
      gap: 3rem;
      align-items: center;
    }

    .media-container {
      width: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      aspect-ratio: 16 / 9;
    }

    .media-container img,
    .media-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .media-caption {
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      color: var(--navy-dark);
      border-top: 1px solid var(--border);
      background: var(--bg-alt);
    }

    /* About Section (Tab 2) */
    .about-text {
      display: flex;
      flex-direction: column;
      font-size: 0.95rem;
      color: var(--navy-dark);
    }

    .about-header {
      padding: 1rem 2rem;
      border-bottom: 2px solid var(--navy-dark);
      background: var(--bg-alt);
    }

    .about-header h2 {
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .about-body {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Team Section */
    .team-section {
      width: 100%;
    }

    .team-photo-container {
      width: 100%;
      border: 1px solid var(--border);
      background: #000;
      aspect-ratio: 16 / 9;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 1rem;
    }

    .team-photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .team-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
    }

    .team-member strong {
      color: var(--navy-dark);
      display: block;
    }

    .story-section {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      margin-top: 0.5rem;
    }

    .story-section h3 {
      font-size: 1rem;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      color: var(--navy-dark);
    }

    /* Placeholder contact block */
    .placeholder-block {
      margin-top: 1.5rem;
      padding: 1.25rem;
      border: 1px dashed var(--navy-dark);
      background: var(--bg-alt);
      font-size: 0.85rem;
    }

    .placeholder-block strong {
      display: block;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <span class="status-tag">DEMO PREVIEW</span>
      <div class="brand-title"><span class="arena">ARENA</span> Robotics</div>
      <span class="brand-sub">Vacuum Tweezers</span>
    </header>

    <nav>
      <button class="tab-btn active" onclick="switchTab('media', this)">[ Videos & Media ]</button>
      <button class="tab-btn" onclick="switchTab('about', this)">[ About Us ]</button>
    </nav>

    <!-- TAB 1: MEDIA (LARGE & CENTERED) -->
    <section id="media" class="tab-content active">
      <div class="media-stack">
        
        <!-- Primary Video Demo -->
        <div class="media-block content-box">
          <div class="media-container">
            <video controls poster="https://via.placeholder.com/1280x720/0a1128/ffffff?text=Video+Placeholder">
              <source src="demo-video.mp4" type="video/mp4">
              Your browser does not support the video tag.
            </video>
          </div>
          <div class="media-caption">
            <strong>01. Operational Demo</strong>
          </div>
        </div>

        <!-- Image Unit 1 -->
        <div class="media-block content-box">
          <div class="media-container">
            <img src="https://via.placeholder.com/1280x720/ffffff/0a1128?text=Image+Placeholder+02" alt="02" />
          </div>
          <div class="media-caption">
            <strong>02.</strong>
          </div>
        </div>

        <!-- Image Unit 2 -->
        <div class="media-block content-box">
          <div class="media-container">
            <img src="https://via.placeholder.com/1280x720/ffffff/0a1128?text=Image+Placeholder+03" alt="03" />
          </div>
          <div class="media-caption">
            <strong>03.</strong>
          </div>
        </div>

      </div>
    </section>

    <!-- TAB 2: ABOUT US -->
    <section id="about" class="tab-content">
      <div class="content-box">
        <div class="about-text">
          <div class="about-header">
            <h2>About Us</h2>
          </div>
          
          <div class="about-body">
            <!-- 1. Team Photo & Names First -->
            <div class="team-section">
              <div class="team-photo-container">
                <img src="https://via.placeholder.com/1280x720/1c2541/ffffff?text=ARENA+Robotics+Team+(3+Members)" alt="ARENA Robotics Team" />
              </div>
              
              <div class="team-list">
                <div class="team-member">
                  <strong>[Name 1]</strong>
                  <span>[Role/Title]</span>
                </div>
                <div class="team-member">
                  <strong>[Name 2]</strong>
                  <span>[Role/Title]</span>
                </div>
                <div class="team-member">
                  <strong>[Name 3]</strong>
                  <span>[Role/Title]</span>
                </div>
              </div>
            </div>

            <!-- 2. Story Below -->
            <div class="story-section">
              <h3>Our Story</h3>
              <p>
                [INSERT STORY PLACEHOLDER]
              </p>
            </div>

            <!-- 3. Contact Placeholder -->
            <div class="placeholder-block">
              <strong>Contact & Feedback:</strong>
              <p>[INSERT EMAIL / CONTACT PLACEHOLDER]</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    function switchTab(tabId, element) {
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      document.getElementById(tabId).classList.add('active');
      element.classList.add('active');
    }
  </script>

</body>
</html>
